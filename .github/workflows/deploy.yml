# Workflow simple para compilar y desplegar a GitHub Pages con Vite
name: Desplegar sitio estático en GitHub Pages

on:
  push:
    branches: ["main", "master"] # Se ejecuta cuando empujas cambios a main o master
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

# Configura permisos del GITHUB_TOKEN para permitir el despliegue
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultáneos redundantes
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compilar aplicación (Vite)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir el resultado de la compilación
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Sube la carpeta 'dist' autogenerada por Vite

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
